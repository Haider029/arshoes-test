<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>ARShoe — Try On</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }

    #loading {
      position: fixed; inset: 0; background: #0D1B35;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.5s;
    }
    #loading h1 { color: white; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    #loading p  { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 32px; }
    #progress-bar {
      width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; background: linear-gradient(90deg, #C9963A, #E8B85A);
      border-radius: 2px; transition: width 0.3s; width: 0%;
    }
    #progress-text { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 12px; }

    #app { position: fixed; inset: 0; }

    video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    canvas#overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }

    canvas#three {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Header */
    #header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      z-index: 10;
    }
    #brand { display: flex; align-items: center; gap: 8px; }
    #brand-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #C9963A, #E8B85A);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: #0D1B35;
    }
    #brand-name { color: white; font-weight: 700; font-size: 18px; }
    #brand-name span { color: #E8B85A; }
    #status-badge {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
      background: rgba(201,150,58,0.2); color: #E8B85A;
      border: 1px solid rgba(201,150,58,0.4);
    }

    /* Detection status */
    #detection-status {
      position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
      z-index: 10; text-align: center;
    }
    #detection-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: rgba(0,0,0,0.5); color: white;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }
    #detection-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #6B7A99; transition: background 0.3s;
    }
    .detected #detection-badge { background: rgba(45,106,79,0.5); border-color: rgba(82,183,136,0.4); }
    .detected #detection-dot  { background: #52B788; animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Shoe selector */
    #shoe-selector {
      position: absolute; bottom: 100px; left: 0; right: 0;
      display: flex; gap: 12px; padding: 0 20px;
      overflow-x: auto; z-index: 10;
      scrollbar-width: none;
    }
    #shoe-selector::-webkit-scrollbar { display: none; }
    .shoe-option {
      flex-shrink: 0; width: 72px; height: 72px;
      border-radius: 16px; border: 2px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; overflow: hidden;
      font-size: 10px; color: rgba(255,255,255,0.7); gap: 4px;
    }
    .shoe-option span { font-size: 28px; }
    .shoe-option.active {
      border-color: #C9963A;
      background: rgba(201,150,58,0.2);
      box-shadow: 0 0 20px rgba(201,150,58,0.3);
    }

    /* Bottom bar */
    #bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 20px 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    #hint {
      font-size: 12px; color: rgba(255,255,255,0.5);
      max-width: 200px; line-height: 1.4;
    }
    #capture-btn {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #C9963A, #E8B85A);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 4px 20px rgba(201,150,58,0.4);
      transition: transform 0.2s;
    }
    #capture-btn:active { transform: scale(0.92); }

    #fps-counter {
      position: absolute; bottom: 100px; right: 20px;
      font-size: 11px; color: rgba(255,255,255,0.3); z-index: 10;
    }

    /* Snapshot overlay */
    #snapshot {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.9); flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #snapshot img { max-width: 90vw; max-height: 70vh; border-radius: 16px; }
    #snapshot-btns { display: flex; gap: 12px; }
    .snap-btn {
      padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer; transition: opacity 0.2s;
    }
    .snap-btn:active { opacity: 0.8; }
    #save-btn  { background: #C9963A; color: #0D1B35; }
    #close-btn { background: rgba(255,255,255,0.15); color: white; }

    /* Error */
    #error {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: #0D1B35; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; padding: 32px;
      text-align: center;
    }
    #error h2 { color: white; font-size: 22px; }
    #error p  { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; }
    #retry-btn {
      padding: 12px 32px; border-radius: 24px;
      background: #C9963A; color: #0D1B35; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div id="brand" style="margin-bottom:24px; flex-direction:column; gap:12px;">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#C9963A,#E8B85A);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#0D1B35;margin:0 auto;">AR</div>
    <div style="color:white;font-size:26px;font-weight:700;text-align:center;">AR<span style="color:#E8B85A;">Shoe</span></div>
  </div>
  <p>Loading foot detection model…</p>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">Initializing…</div>
</div>

<!-- Error screen -->
<div id="error">
  <h2>Camera Access Required</h2>
  <p>ARShoe needs camera permission to detect your feet and show the shoe try-on experience.</p>
  <button id="retry-btn" onclick="location.reload()">Try Again</button>
</div>

<!-- Main app -->
<div id="app" style="display:none;">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <canvas id="three"></canvas>

  <!-- Header -->
  <div id="header">
    <div id="brand">
      <div id="brand-icon">AR</div>
      <div id="brand-name">AR<span>Shoe</span></div>
    </div>
    <div id="status-badge">✦ Live</div>
  </div>

  <!-- Detection status -->
  <div id="detection-status">
    <div id="detection-badge">
      <div id="detection-dot"></div>
      <span id="detection-text">Point camera at your feet</span>
    </div>
  </div>

  <!-- Shoe selector -->
  <div id="shoe-selector">
    <div class="shoe-option active" data-shoe="sneaker" onclick="selectShoe(this)">
      <span>👟</span>Sneaker
    </div>
    <div class="shoe-option" data-shoe="boot" onclick="selectShoe(this)">
      <span>🥾</span>Boot
    </div>
    <div class="shoe-option" data-shoe="heel" onclick="selectShoe(this)">
      <span>👠</span>Heel
    </div>
    <div class="shoe-option" data-shoe="loafer" onclick="selectShoe(this)">
      <span>🥿</span>Loafer
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <div id="hint">Point camera at your feet to try on shoes in AR</div>
    <button id="capture-btn" onclick="captureSnapshot()">📸</button>
    <div id="fps-counter"></div>
  </div>
</div>

<!-- Snapshot overlay -->
<div id="snapshot">
  <img id="snapshot-img" src="" alt="Snapshot"/>
  <div id="snapshot-btns">
    <button class="snap-btn" id="save-btn" onclick="saveSnapshot()">💾 Save</button>
    <button class="snap-btn" id="close-btn" onclick="closeSnapshot()">✕ Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const MODEL_URL   = 'arshoe-best-quantized.onnx'; // serve this file alongside HTML
const INPUT_SIZE  = 640;
const CONF_THRESH = 0.35;
const IOU_THRESH  = 0.45;

// ─── STATE ────────────────────────────────────────────────────────────────────
let session       = null;
let animFrameId   = null;
let isDetecting   = false;
let lastDetection = null;
let selectedShoe  = 'sneaker';
let snapshotData  = null;
let fpsFrames     = 0;
let fpsLast       = performance.now();

// ─── DOM ──────────────────────────────────────────────────────────────────────
const video      = document.getElementById('video');
const overlayCanvas = document.getElementById('overlay');
const overlayCtx = overlayCanvas.getContext('2d');
const threeCanvas = document.getElementById('three');
const loadingEl  = document.getElementById('loading');
const appEl      = document.getElementById('app');
const errorEl    = document.getElementById('error');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const detectionStatus = document.getElementById('detection-status');
const detectionText   = document.getElementById('detection-text');
const fpsCounter  = document.getElementById('fps-counter');

// ─── THREE.JS SETUP ───────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xC9963A, 0.4);
fillLight.position.set(-5, -5, -5);
scene.add(fillLight);

// Shoe 3D model (procedural — replace with real GLB when available)
let shoeGroup = null;

function createShoe(type) {
  if (shoeGroup) scene.remove(shoeGroup);
  shoeGroup = new THREE.Group();

  const colors = {
    sneaker: { main: 0xffffff, sole: 0x333333, accent: 0xC9963A },
    boot:    { main: 0x3D2B1F, sole: 0x1A0F0A, accent: 0x8B6914 },
    heel:    { main: 0xFF69B4, sole: 0x8B0045, accent: 0xFFD700 },
    loafer:  { main: 0x5C3A1E, sole: 0x2A1A0A, accent: 0xD4A843 },
  };
  const c = colors[type] || colors.sneaker;

  // Sole
  const soleGeo = new THREE.BoxGeometry(2.2, 0.2, 0.85);
  const soleMat = new THREE.MeshStandardMaterial({ color: c.sole, roughness: 0.8 });
  const sole = new THREE.Mesh(soleGeo, soleMat);
  sole.position.y = 0;
  shoeGroup.add(sole);

  // Main body
  const bodyGeo = new THREE.BoxGeometry(2.0, 0.5, 0.75);
  const bodyMat = new THREE.MeshStandardMaterial({ color: c.main, roughness: 0.4, metalness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.35;
  shoeGroup.add(body);

  // Toe cap
  const toeGeo = new THREE.SphereGeometry(0.42, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
  const toeMat = new THREE.MeshStandardMaterial({ color: c.main, roughness: 0.4 });
  const toe = new THREE.Mesh(toeGeo, toeMat);
  toe.position.set(0.9, 0.35, 0);
  toe.rotation.z = -Math.PI / 2;
  shoeGroup.add(toe);

  // Heel counter
  const heelGeo = new THREE.BoxGeometry(0.5, 0.6, 0.75);
  const heelMat = new THREE.MeshStandardMaterial({ color: c.accent, roughness: 0.5 });
  const heel = new THREE.Mesh(heelGeo, heelMat);
  heel.position.set(-0.85, 0.42, 0);
  shoeGroup.add(heel);

  if (type === 'heel') {
    const heelPinGeo = new THREE.CylinderGeometry(0.06, 0.04, 0.6, 8);
    const heelPin = new THREE.Mesh(heelPinGeo, new THREE.MeshStandardMaterial({ color: c.sole }));
    heelPin.position.set(-0.85, -0.1, 0);
    shoeGroup.add(heelPin);
  }

  // Laces (sneaker only)
  if (type === 'sneaker') {
    for (let i = 0; i < 4; i++) {
      const laceGeo = new THREE.BoxGeometry(0.05, 0.02, 0.6);
      const laceMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
      const lace = new THREE.Mesh(laceGeo, laceMat);
      lace.position.set(0.3 - i * 0.22, 0.62, 0);
      shoeGroup.add(lace);
    }
  }

  shoeGroup.visible = false;
  scene.add(shoeGroup);
  return shoeGroup;
}

createShoe('sneaker');

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  overlayCanvas.width  = w;
  overlayCanvas.height = h;
  threeCanvas.width    = w;
  threeCanvas.height   = h;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ─── LOAD MODEL ───────────────────────────────────────────────────────────────
async function loadModel() {
  setProgress(10, 'Loading ONNX Runtime…');
  ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';

  setProgress(30, 'Downloading model…');
  session = await ort.InferenceSession.create(MODEL_URL, {
    executionProviders: ['wasm'],
    graphOptimizationLevel: 'all',
  });

  setProgress(100, 'Ready!');
}

function setProgress(pct, text) {
  progressFill.style.width = pct + '%';
  progressText.textContent = text;
}

// ─── CAMERA ───────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    video.play();
  } catch (e) {
    // Try front camera as fallback
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      video.play();
    } catch (e2) {
      showError();
      throw e2;
    }
  }
}

// ─── PREPROCESS ───────────────────────────────────────────────────────────────
function preprocessFrame() {
  const canvas = document.createElement('canvas');
  canvas.width  = INPUT_SIZE;
  canvas.height = INPUT_SIZE;
  const ctx = canvas.getContext('2d');

  // Letterbox
  const vw = video.videoWidth  || 640;
  const vh = video.videoHeight || 480;
  const scale = Math.min(INPUT_SIZE / vw, INPUT_SIZE / vh);
  const sw = vw * scale;
  const sh = vh * scale;
  const ox = (INPUT_SIZE - sw) / 2;
  const oy = (INPUT_SIZE - sh) / 2;

  ctx.fillStyle = '#888';
  ctx.fillRect(0, 0, INPUT_SIZE, INPUT_SIZE);
  ctx.drawImage(video, ox, oy, sw, sh);

  const imageData = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
  const data      = imageData.data;
  const float32   = new Float32Array(3 * INPUT_SIZE * INPUT_SIZE);

  for (let i = 0; i < INPUT_SIZE * INPUT_SIZE; i++) {
    float32[i]                              = data[i * 4]     / 255.0; // R
    float32[i + INPUT_SIZE * INPUT_SIZE]    = data[i * 4 + 1] / 255.0; // G
    float32[i + INPUT_SIZE * INPUT_SIZE * 2] = data[i * 4 + 2] / 255.0; // B
  }

  return { tensor: new ort.Tensor('float32', float32, [1, 3, INPUT_SIZE, INPUT_SIZE]), scale, ox, oy, vw, vh };
}

// ─── NMS ──────────────────────────────────────────────────────────────────────
function nms(boxes, scores, iouThreshold) {
  const indices = scores.map((s, i) => i).sort((a, b) => scores[b] - scores[a]);
  const keep = [];
  const suppressed = new Set();

  for (const i of indices) {
    if (suppressed.has(i)) continue;
    keep.push(i);
    for (const j of indices) {
      if (suppressed.has(j) || i === j) continue;
      if (iou(boxes[i], boxes[j]) > iouThreshold) suppressed.add(j);
    }
  }
  return keep;
}

function iou(a, b) {
  const x1 = Math.max(a[0], b[0]); const y1 = Math.max(a[1], b[1]);
  const x2 = Math.min(a[2], b[2]); const y2 = Math.min(a[3], b[3]);
  const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
  const aArea = (a[2]-a[0]) * (a[3]-a[1]);
  const bArea = (b[2]-b[0]) * (b[3]-b[1]);
  return inter / (aArea + bArea - inter);
}

// ─── POSTPROCESS ──────────────────────────────────────────────────────────────
function postprocess(output0, output1, scale, ox, oy, vw, vh) {
  const [, numDets, numAnchors] = [1, 37, 8400]; // output0 shape
  const data = output0.data;

  const boxes = [], scores = [], maskCoeffs = [];

  for (let i = 0; i < 8400; i++) {
    const conf = data[4 * 8400 + i]; // objectness at index 4
    if (conf < CONF_THRESH) continue;

    const cx = data[0 * 8400 + i];
    const cy = data[1 * 8400 + i];
    const w  = data[2 * 8400 + i];
    const h  = data[3 * 8400 + i];

    boxes.push([cx - w/2, cy - h/2, cx + w/2, cy + h/2]);
    scores.push(conf);

    const coeffs = [];
    for (let k = 0; k < 32; k++) coeffs.push(data[(5 + k) * 8400 + i]);
    maskCoeffs.push(coeffs);
  }

  if (boxes.length === 0) return null;

  const keepIdx = nms(boxes, scores, IOU_THRESH);
  if (keepIdx.length === 0) return null;

  // Best detection
  const best = keepIdx[0];
  const box  = boxes[best];

  // Scale box back to video coordinates
  const x1 = (box[0] - ox) / scale;
  const y1 = (box[1] - oy) / scale;
  const x2 = (box[2] - ox) / scale;
  const y2 = (box[3] - oy) / scale;

  // Center and size in normalized coords
  const cx = (x1 + x2) / 2 / vw;
  const cy = (y1 + y2) / 2 / vh;
  const bw = (x2 - x1) / vw;
  const bh = (y2 - y1) / vh;

  return { cx, cy, bw, bh, score: scores[best], box: [x1, y1, x2, y2] };
}

// ─── DRAW OVERLAY ─────────────────────────────────────────────────────────────
function drawOverlay(detection) {
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  if (!detection) return;

  const W = overlayCanvas.width;
  const H = overlayCanvas.height;
  const { box } = detection;

  const vw = video.videoWidth  || 640;
  const vh = video.videoHeight || 480;
  const sx = W / vw;
  const sy = H / vh;

  const x1 = box[0] * sx; const y1 = box[1] * sy;
  const x2 = box[2] * sx; const y2 = box[3] * sy;

  // Glow effect
  overlayCtx.shadowColor = 'rgba(201,150,58,0.8)';
  overlayCtx.shadowBlur  = 20;
  overlayCtx.strokeStyle = 'rgba(201,150,58,0.9)';
  overlayCtx.lineWidth   = 2.5;
  overlayCtx.strokeRect(x1, y1, x2 - x1, y2 - y1);
  overlayCtx.shadowBlur  = 0;

  // Corner accents
  const cs = 18;
  overlayCtx.strokeStyle = '#E8B85A';
  overlayCtx.lineWidth   = 3;
  [[x1,y1,1,1],[x2,y1,-1,1],[x1,y2,1,-1],[x2,y2,-1,-1]].forEach(([cx,cy,dx,dy]) => {
    overlayCtx.beginPath();
    overlayCtx.moveTo(cx + dx * cs, cy);
    overlayCtx.lineTo(cx, cy);
    overlayCtx.lineTo(cx, cy + dy * cs);
    overlayCtx.stroke();
  });

  // Confidence label
  overlayCtx.fillStyle = 'rgba(201,150,58,0.9)';
  overlayCtx.fillRect(x1, y1 - 22, 80, 22);
  overlayCtx.fillStyle = '#0D1B35';
  overlayCtx.font = 'bold 11px -apple-system';
  overlayCtx.fillText(`Foot ${Math.round(detection.score * 100)}%`, x1 + 6, y1 - 7);
}

// ─── POSITION SHOE ────────────────────────────────────────────────────────────
function positionShoe(detection) {
  if (!detection || !shoeGroup) return;

  const { cx, cy, bw, bh } = detection;

  // Map normalized video coords to Three.js world coords
  const x = (cx - 0.5) * 10 * camera.aspect;
  const y = -(cy - 0.5) * 10;

  // Scale shoe to foot size
  const footWidth = bw * 10 * camera.aspect;
  const scale     = footWidth * 1.1;

  shoeGroup.position.set(x, y, 0);
  shoeGroup.scale.setScalar(Math.max(0.3, Math.min(2.5, scale)));

  // Slight rotation for realism
  shoeGroup.rotation.y = (cx - 0.5) * 0.3;
  shoeGroup.rotation.x = 0.15;
  shoeGroup.visible = true;
}

// ─── INFERENCE LOOP ───────────────────────────────────────────────────────────
let inferenceRunning = false;

async function runInference() {
  if (inferenceRunning || !session || video.readyState < 2) return;
  inferenceRunning = true;

  try {
    const { tensor, scale, ox, oy, vw, vh } = preprocessFrame();
    const feeds = { images: tensor };
    const results = await session.run(feeds);

    const detection = postprocess(results.output0, results.output1, scale, ox, oy, vw, vh);
    lastDetection = detection;

    drawOverlay(detection);
    positionShoe(detection);

    if (detection) {
      detectionStatus.classList.add('detected');
      detectionText.textContent = `Foot detected — ${Math.round(detection.score * 100)}% confidence`;
    } else {
      detectionStatus.classList.remove('detected');
      detectionText.textContent = 'Point camera at your feet';
      if (shoeGroup) shoeGroup.visible = false;
    }
  } catch (e) {
    console.error('Inference error:', e);
  }

  inferenceRunning = false;
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
let lastInference = 0;
const INFERENCE_INTERVAL = 100; // ms between inferences

function renderLoop(timestamp) {
  animFrameId = requestAnimationFrame(renderLoop);

  // FPS counter
  fpsFrames++;
  if (timestamp - fpsLast > 1000) {
    fpsCounter.textContent = `${fpsFrames} FPS`;
    fpsFrames = 0;
    fpsLast   = timestamp;
  }

  // Run inference every N ms
  if (timestamp - lastInference > INFERENCE_INTERVAL) {
    lastInference = timestamp;
    runInference();
  }

  // Animate shoe
  if (shoeGroup && shoeGroup.visible) {
    shoeGroup.rotation.y += 0.005;
  }

  renderer.render(scene, camera);
}

// ─── SHOE SELECTOR ────────────────────────────────────────────────────────────
function selectShoe(el) {
  document.querySelectorAll('.shoe-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  selectedShoe = el.dataset.shoe;
  createShoe(selectedShoe);
}

// ─── SNAPSHOT ─────────────────────────────────────────────────────────────────
function captureSnapshot() {
  const snap = document.createElement('canvas');
  snap.width  = window.innerWidth;
  snap.height = window.innerHeight;
  const ctx = snap.getContext('2d');

  // Draw video
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const scale = Math.max(snap.width / vw, snap.height / vh);
  const sw = vw * scale;
  const sh = vh * scale;
  const ox = (snap.width - sw) / 2;
  const oy = (snap.height - sh) / 2;
  ctx.save();
  ctx.translate(snap.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, ox, oy, sw, sh);
  ctx.restore();

  // Draw overlay
  ctx.drawImage(overlayCanvas, 0, 0);

  // Draw three
  ctx.drawImage(threeCanvas, 0, 0);

  // Watermark
  ctx.fillStyle = 'rgba(201,150,58,0.9)';
  ctx.fillRect(16, snap.height - 44, 90, 28);
  ctx.fillStyle = '#0D1B35';
  ctx.font = 'bold 13px -apple-system';
  ctx.fillText('✦ ARShoe', 24, snap.height - 24);

  snapshotData = snap.toDataURL('image/jpeg', 0.92);
  document.getElementById('snapshot-img').src = snapshotData;
  document.getElementById('snapshot').style.display = 'flex';
}

function saveSnapshot() {
  const a = document.createElement('a');
  a.href     = snapshotData;
  a.download = 'arshoe-tryon.jpg';
  a.click();
}

function closeSnapshot() {
  document.getElementById('snapshot').style.display = 'none';
}

// ─── ERROR ────────────────────────────────────────────────────────────────────
function showError() {
  loadingEl.style.display = 'none';
  errorEl.style.display   = 'flex';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    setProgress(5, 'Requesting camera…');
    await startCamera();

    setProgress(20, 'Loading model…');
    await loadModel();

    setProgress(100, 'Ready!');
    await new Promise(r => setTimeout(r, 500));

    loadingEl.style.opacity = '0';
    setTimeout(() => { loadingEl.style.display = 'none'; }, 500);
    appEl.style.display = 'block';

    renderLoop(performance.now());
  } catch (e) {
    console.error('Init error:', e);
    showError();
  }
}

init();
</script>
